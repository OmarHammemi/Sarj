# HeshamHaroon dataset — short clips, diacritized MSA (matches Kaggle notebook)
dataset:
  name: "HeshamHaroon/arabic-msa-25k-saudi-male-tashkeel"
  train_split: 0.9
  seed: 42

audio:
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 80
  fmin: 0
  fmax: 8000
  trim_top_db: 30
  min_duration: 1.5
  max_duration: 15.0

model:
  d_model: 256
  n_heads: 4
  encoder_layers: 4
  decoder_layers: 4
  ffn_dim: 1024
  kernel_size: 3
  dropout: 0.1
  use_postnet: true
  max_seq_len: 512

train:
  batch_size: 8
  num_workers: 0
  lr: 0.0003
  weight_decay: 0.0001
  max_steps: 19000
  grad_clip: 1.0
  log_every: 200
  save_every: 2000
  val_every: 2000

synthesis:
  griffin_lim_iters: 60

paths:
  root: "."
  checkpoint: "checkpoints/latest.pt"
  vocab: "data/vocab.json"
